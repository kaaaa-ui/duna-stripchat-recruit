<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヅナ X投稿画像 - データ戦略</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1200px; height: 675px;
  background: #0a0a0f;
  position: relative; overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  color: #fff;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(6,182,212,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(168,85,247,0.12) 0%, transparent 50%);
}
.grid {
  position: absolute; inset: 0; opacity: 0.06;
  background-image:
    linear-gradient(rgba(6,182,212,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,0.4) 1px, transparent 1px);
  background-size: 50px 50px;
}
.content {
  position: relative; z-index: 2;
  display: flex; height: 100%; padding: 48px 56px;
  align-items: center; gap: 48px;
}
.left { flex: 1; }
.badge {
  display: inline-block;
  background: rgba(6,182,212,0.12);
  border: 1px solid rgba(6,182,212,0.3);
  color: #06b6d4; font-size: 12px; font-weight: 700;
  padding: 5px 14px; border-radius: 20px;
  margin-bottom: 20px; letter-spacing: 1px;
}
h1 { font-size: 38px; font-weight: 900; line-height: 1.4; margin-bottom: 20px; }
h1 .accent {
  color: #06b6d4;
}
h1 .purple {
  background: linear-gradient(135deg, #a855f7, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.desc { font-size: 15px; color: #9ca3af; line-height: 1.8; margin-bottom: 28px; }
.features {
  display: flex; flex-direction: column; gap: 12px;
}
.feature {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 12px 16px;
}
.feature-icon {
  width: 36px; height: 36px;
  background: rgba(168,85,247,0.12);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #a855f7; font-size: 16px; flex-shrink: 0;
}
.feature-text { font-size: 14px; font-weight: 700; }
.feature-text span { color: #6b7280; font-weight: 400; font-size: 12px; display: block; margin-top: 2px; }
/* 右側：チャート風ビジュアル */
.right {
  width: 420px; height: 100%;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  gap: 16px;
}
.chart-card {
  width: 100%; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 12px; padding: 24px;
}
.chart-title { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
.bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
.bar {
  flex: 1; border-radius: 4px 4px 0 0;
  position: relative;
}
.bar::after {
  content: attr(data-label);
  position: absolute; bottom: -20px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; color: #6b7280; white-space: nowrap;
}
.bar:nth-child(1) { height: 30%; background: rgba(168,85,247,0.3); }
.bar:nth-child(2) { height: 45%; background: rgba(168,85,247,0.4); }
.bar:nth-child(3) { height: 55%; background: rgba(168,85,247,0.5); }
.bar:nth-child(4) { height: 70%; background: rgba(6,182,212,0.5); }
.bar:nth-child(5) { height: 85%; background: rgba(6,182,212,0.6); }
.bar:nth-child(6) { height: 100%; background: linear-gradient(180deg, #a855f7, #06b6d4); }
/* 数値カード */
.num-row { display: flex; gap: 12px; width: 100%; }
.num-card {
  flex: 1; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(168,85,247,0.12);
  border-radius: 10px; padding: 16px; text-align: center;
}
.num-card .value {
  font-size: 26px; font-weight: 900;
  background: linear-gradient(135deg, #a855f7, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.num-card .label { font-size: 10px; color: #6b7280; margin-top: 4px; }
.logo {
  position: absolute; bottom: 24px; right: 32px;
  font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,0.2); letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="content">
    <div class="left">
      <div class="badge">DATA DRIVEN STRATEGY</div>
      <h1><span class="accent">感覚</span>じゃない。<br><span class="purple">データ</span>で勝つ。</h1>
      <div class="desc">配信時間・ターゲット・コンテンツ戦略を<br>データ分析で最適化</div>
      <div class="features">
        <div class="feature">
          <div class="feature-icon">📊</div>
          <div class="feature-text">時間帯分析<span>最も稼げる配信タイミングを特定</span></div>
        </div>
        <div class="feature">
          <div class="feature-icon">🎯</div>
          <div class="feature-text">ターゲット分析<span>あなたに合うファン層を見極める</span></div>
        </div>
        <div class="feature">
          <div class="feature-icon">📈</div>
          <div class="feature-text">収益シミュレーション<span>具体的な収入ロードマップを提示</span></div>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="chart-card">
        <div class="chart-title">収益推移（サポート開始後）</div>
        <div class="bars">
          <div class="bar" data-label="1月"></div>
          <div class="bar" data-label="2月"></div>
          <div class="bar" data-label="3月"></div>
          <div class="bar" data-label="4月"></div>
          <div class="bar" data-label="5月"></div>
          <div class="bar" data-label="6月"></div>
        </div>
      </div>
      <div class="num-row">
        <div class="num-card">
          <div class="value">50万+</div>
          <div class="label">平均月収</div>
        </div>
        <div class="num-card">
          <div class="value">95%</div>
          <div class="label">継続率</div>
        </div>
      </div>
    </div>
  </div>
  <div class="logo">ヅナ｜戦略メンター</div>
</div>
</body>
</html>
