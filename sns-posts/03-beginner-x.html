<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヅナ X投稿画像 - 未経験者向け</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1200px; height: 675px;
  background: #0a0a0f;
  position: relative; overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  color: #fff;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(6,182,212,0.1) 0%, transparent 40%);
}
.content {
  position: relative; z-index: 2;
  height: 100%; padding: 48px 64px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
}
.top-label {
  font-size: 13px; color: #a855f7; font-weight: 700;
  letter-spacing: 3px; margin-bottom: 20px;
}
h1 { font-size: 48px; font-weight: 900; line-height: 1.35; margin-bottom: 12px; }
h1 .grad {
  background: linear-gradient(135deg, #a855f7, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.sub { font-size: 16px; color: #9ca3af; margin-bottom: 36px; }
/* 3ステップ */
.steps {
  display: flex; gap: 24px; margin-bottom: 36px;
}
.step {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 12px; padding: 24px 28px;
  width: 220px; text-align: center;
}
.step-num {
  font-size: 11px; font-weight: 900; color: #06b6d4;
  letter-spacing: 2px; margin-bottom: 8px;
}
.step-icon {
  font-size: 28px; margin-bottom: 8px;
}
.step-title {
  font-size: 16px; font-weight: 900; margin-bottom: 4px;
}
.step-desc {
  font-size: 11px; color: #6b7280;
}
.arrow-sep {
  display: flex; align-items: center;
  color: #a855f7; font-size: 24px; font-weight: 700;
  opacity: 0.4;
}
.cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  padding: 14px 36px; border-radius: 8px;
  font-size: 16px; font-weight: 700;
  box-shadow: 0 0 30px rgba(168,85,247,0.25);
}
.cta .line-badge {
  background: #06C755; color: #fff;
  font-size: 11px; font-weight: 900;
  padding: 3px 8px; border-radius: 4px;
}
.note { font-size: 11px; color: #6b7280; margin-top: 10px; }
.logo {
  position: absolute; bottom: 20px; right: 32px;
  font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.18); letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="top-label">FOR BEGINNERS</div>
    <h1>未経験でも<span class="grad">月50万</span>を<br>目指せる理由</h1>
    <div class="sub">最短3ステップで配信開始。ヅナが徹底サポート。</div>
    <div class="steps">
      <div class="step">
        <div class="step-num">STEP 01</div>
        <div class="step-icon">💬</div>
        <div class="step-title">LINE登録</div>
        <div class="step-desc">まずは友だち追加</div>
      </div>
      <div class="arrow-sep">›››</div>
      <div class="step">
        <div class="step-num">STEP 02</div>
        <div class="step-icon">🎯</div>
        <div class="step-title">ヒアリング</div>
        <div class="step-desc">あなたの状況を把握</div>
      </div>
      <div class="arrow-sep">›››</div>
      <div class="step">
        <div class="step-num">STEP 03</div>
        <div class="step-icon">🚀</div>
        <div class="step-title">配信スタート</div>
        <div class="step-desc">最適プランで開始</div>
      </div>
    </div>
    <div class="cta">
      <span class="line-badge">LINE</span>
      まずは無料相談 →
    </div>
    <div class="note">完全無料・匿名OK・24時間受付中</div>
  </div>
  <div class="logo">ヅナ｜戦略メンター</div>
</div>
</body>
</html>
