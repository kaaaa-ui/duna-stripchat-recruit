<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヅナ Instagram投稿画像 - メイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px; height: 1080px;
  background: #0a0a0f;
  position: relative; overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  color: #fff;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 85%, rgba(168,85,247,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 20%, rgba(6,182,212,0.08) 0%, transparent 40%);
}
.grid {
  position: absolute; inset: 0; opacity: 0.04;
  background-image:
    linear-gradient(rgba(168,85,247,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.5) 1px, transparent 1px);
  background-size: 54px 54px;
}
.content {
  position: relative; z-index: 2;
  height: 100%; padding: 56px;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
}
/* アバターエリア */
.avatar-wrap {
  width: 260px; height: 300px;
  position: relative; margin-bottom: 24px;
}
.avatar-wrap img {
  width: 100%; height: 100%; object-fit: contain;
  filter: drop-shadow(0 0 50px rgba(168,85,247,0.35));
}
.avatar-glow {
  position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
  width: 220px; height: 120px;
  background: radial-gradient(ellipse, rgba(168,85,247,0.25) 0%, transparent 70%);
}
.badge {
  display: inline-block;
  background: rgba(168,85,247,0.12);
  border: 1px solid rgba(168,85,247,0.3);
  color: #a855f7; font-size: 13px; font-weight: 700;
  padding: 6px 18px; border-radius: 20px;
  margin-bottom: 20px; letter-spacing: 1px;
}
h1 { font-size: 44px; font-weight: 900; line-height: 1.35; margin-bottom: 12px; }
h1 .big {
  font-size: 56px;
  background: linear-gradient(135deg, #a855f7, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.sub { font-size: 15px; color: #9ca3af; margin-bottom: 28px; line-height: 1.8; }
.sub strong { color: #06b6d4; }
/* 数値エリア */
.stats { display: flex; gap: 20px; margin-bottom: 32px; }
.stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(168,85,247,0.12);
  border-radius: 12px; padding: 16px 24px;
  text-align: center; min-width: 130px;
}
.stat .num {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, #a855f7, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat .label { font-size: 11px; color: #6b7280; margin-top: 2px; }
/* CTA */
.cta {
  display: inline-flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  padding: 16px 40px; border-radius: 10px;
  font-size: 17px; font-weight: 700;
  box-shadow: 0 0 40px rgba(168,85,247,0.3);
}
.cta .line-badge {
  background: #06C755; color: #fff;
  font-size: 12px; font-weight: 900;
  padding: 4px 10px; border-radius: 4px;
}
.note { font-size: 12px; color: #6b7280; margin-top: 12px; }
.logo {
  position: absolute; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.15); letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="content">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <img src="../duna-avatar.png" alt="ヅナ">
    </div>
    <div class="badge">戦略メンター｜ヅナ</div>
    <h1>ストチャで、<br><span class="big">戦略的に稼ぐ。</span></h1>
    <div class="sub">感覚じゃない。<strong>データ</strong>で勝つ。<br>未経験でも月50万を目指せるメンター型サポート</div>
    <div class="stats">
      <div class="stat"><div class="num">50万+</div><div class="label">平均月収</div></div>
      <div class="stat"><div class="num">100人+</div><div class="label">サポート実績</div></div>
      <div class="stat"><div class="num">95%</div><div class="label">継続率</div></div>
    </div>
    <div class="cta">
      <span class="line-badge">LINE</span>
      LINEで無料相談する →
    </div>
    <div class="note">完全無料・匿名OK・24時間受付中</div>
  </div>
  <div class="logo">duna-recruit.vercel.app</div>
</div>
</body>
</html>
